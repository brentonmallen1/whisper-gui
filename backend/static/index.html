<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Whisper GUI - Transcribe audio files using OpenAI Whisper" />
  <title>Whisper GUI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-left">
        <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
        <h1>Whisper GUI</h1>
      </div>
      <div id="info-badge" class="info-badge" title="Active engine and model"></div>
    </header>

    <nav class="tab-nav" role="tablist" aria-label="Main navigation">
      <button id="tab-transcribe" class="tab-btn active" role="tab" aria-selected="true" aria-controls="transcribe-panel">Transcribe</button>
      <button id="tab-files" class="tab-btn" role="tab" aria-selected="false" aria-controls="files-panel">Files</button>
    </nav>

    <main class="main">
      <!-- Transcribe panel -->
      <div id="transcribe-panel" role="tabpanel" aria-labelledby="tab-transcribe">
      <!-- Upload zone -->
      <section id="upload-section" class="upload-section">
        <div id="drop-zone" class="drop-zone">
          <div class="drop-inner">
            <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
              <polyline points="16 16 12 12 8 16"/>
              <line x1="12" y1="12" x2="12" y2="21"/>
              <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
            </svg>
            <p class="drop-title">Drag &amp; drop audio here</p>
            <p class="drop-sub">or</p>
            <button id="browse-btn" class="btn btn-primary">Choose file</button>
            <input
              type="file"
              id="file-input"
              accept=".mp3,.wav,.m4a,.flac,.ogg,.webm,.opus,.aac,.wma"
              aria-label="Select audio file to transcribe"
              hidden
            />
            <p class="formats">MP3 · WAV · M4A · FLAC · OGG · WEBM · OPUS · AAC</p>
          </div>
        </div>
      </section>

      <!-- Progress -->
      <section id="progress-section" class="progress-section hidden" aria-live="polite">
        <div class="progress-file">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
          </svg>
          <span id="progress-filename">audio.mp3</span>
        </div>
        <div class="progress-track" role="progressbar" aria-label="Transcription progress">
          <div id="progress-bar" class="progress-bar indeterminate"></div>
        </div>
        <p id="progress-label" class="progress-label">Uploading...</p>
      </section>

      <!-- Result -->
      <section id="result-section" class="result-section hidden">
        <div class="result-header">
          <div class="result-meta">
            <h2>Transcription</h2>
            <span id="result-words" class="result-words"></span>
          </div>
          <div class="result-actions">
            <button id="edit-btn" class="btn btn-secondary" title="Edit transcription" aria-pressed="false">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
              <span id="edit-label">Edit</span>
            </button>
            <button id="copy-btn" class="btn btn-secondary">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
              <span class="btn-text">Copy</span>
            </button>
            <button id="export-btn" class="btn btn-secondary">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/>
                <line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
              Download .txt
            </button>
            <button id="reset-btn" class="btn btn-ghost">New file</button>
          </div>
        </div>
        <audio id="audio-player" class="audio-player" controls aria-label="Transcribed audio playback"></audio>
        <textarea id="result-text" class="result-text" readonly spellcheck="false" aria-label="Transcription text"></textarea>
      </section>

      <!-- Error -->
      <section id="error-section" class="error-section hidden" role="alert" aria-live="assertive">
        <svg class="error-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/>
          <line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p id="error-msg" class="error-msg">Something went wrong.</p>
        <button id="retry-btn" class="btn btn-primary">Try again</button>
      </section>
      </div>

      <!-- File browser -->
      <section id="files-panel" class="files-section hidden" role="tabpanel" aria-labelledby="tab-files">
        <div id="files-empty" class="files-empty hidden">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
            <path d="M9 18V5l12-2v13"/>
            <circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/>
          </svg>
          <p>No files uploaded yet.</p>
          <p class="files-empty-sub">Files you transcribe will appear here.</p>
        </div>
        <ul id="files-list" class="files-list" aria-label="Uploaded files"></ul>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
</body>
</html>
