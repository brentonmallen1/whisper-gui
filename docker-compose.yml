services:
  whisper-gui:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        PLAYWRIGHT_BASE_IMAGE: "${DOCKER_REGISTRY}:playwright-base"
    ports:
      - "${APP_PORT:-8880}:8000"
      # Uncomment to expose the API on a separate host port (e.g. for dedicated firewall rules)
      # - "${API_PORT:-8881}:8000"
    environment:
      # ── API access ────────────────────────────────────────────────────────
      # Optional bearer token for programmatic API access.
      # Set to a long random string. Pass as: Authorization: Bearer <key>  or  X-API-Key: <key>
      API_KEY: ${API_KEY:-}
      # ── Transcription engine (seeds DB on first run) ──────────────────────
      TRANSCRIPTION_ENGINE: ${TRANSCRIPTION_ENGINE:-faster-whisper}
      WHISPER_MODEL_SIZE:   ${WHISPER_MODEL_SIZE:-large-v3}
      CANARY_MODEL:         ${CANARY_MODEL:-nvidia/canary-qwen-2.5b}
      QWEN_MODEL:           ${QWEN_MODEL:-Qwen/Qwen2.5-Audio-3B-Instruct}
      COMPUTE_TYPE:         ${COMPUTE_TYPE:-int8}
      LANGUAGE:             ${LANGUAGE:-en}
      # ── Model caches ───────────────────────────────────────────────────────
      # HuggingFace model cache — all HF models land here (faster-whisper, canary, qwen-audio).
      HF_HOME:              /models/hf
      # openai-whisper downloads .pt files here (separate from HF cache).
      WHISPER_DOWNLOAD_ROOT: /models/whisper
      # ── App data ──────────────────────────────────────────────────────────
      # SQLite database and other persistent app data (settings, job history).
      DATA_DIR:             /data
      # Audio upload cache directory.
      AUDIO_CACHE_DIR:      /cache/audio
    volumes:
      - ${MODELS_VOLUME:-./volumes/models}:/models
      - ${AUDIO_CACHE_VOLUME:-./volumes/audio_cache}:/cache/audio
      - ${DATA_VOLUME:-./volumes/data}:/data
    restart: unless-stopped
